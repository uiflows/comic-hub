server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker 内置 DNS（用于 proxy_pass 域名解析）
    resolver 127.0.0.11 valid=30s;

    # gzip 静态资源
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # 健康检查
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # 本地漫画数据 (爬虫下载的漫画 + manga.json + 封面)
    location /data/ {
        alias /data/manga/;
        autoindex on;
        autoindex_exact_size off;
        add_header Cache-Control "public, max-age=3600";
    }

    # 代理 MangaDex API
    location /api/ {
        proxy_pass https://api.mangadex.org/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.mangadex.org;
        proxy_set_header User-Agent "ComicHub/1.0";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
    }

    # 代理 MangaDex 封面
    location /covers/ {
        proxy_pass https://uploads.mangadex.org/covers/;
        proxy_ssl_server_name on;
        proxy_set_header Host uploads.mangadex.org;
        proxy_set_header User-Agent "ComicHub/1.0";
        proxy_set_header Referer "";
        proxy_set_header Accept-Encoding "";
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # 静态前端 (index.html / local.html / lib.js / style.css)
    location / {
        try_files $uri $uri/ =404;
    }
}
